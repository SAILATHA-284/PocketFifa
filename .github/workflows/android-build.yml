name: Build Pocket Football Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install NPM dependencies & Build Web Assets
      - name: Install Dependencies
        run: npm ci

      - name: Build React Application
        run: npm run build

      # 4. Synchronize Capacitor Assets to Android
      - name: Install Capacitor CLI
        run: npm install @capacitor/cli @capacitor/android

      - name: Sync Capacitor Android
        run: npx cap sync android

      # 5. Setup Java 21 JDK (Required for compileDebugJavaWithJavac)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      # 6. Make Gradle wrapper executable (Fixes Permission Denied 126)
      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      # 7. Compile and Build Android APK
      - name: Build Android App (Debug APK)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # 8. Upload the built APK as a downloadable artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-football-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7