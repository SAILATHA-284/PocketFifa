name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows you to run this manually from the GitHub UI

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js Environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: '18'
          cache: 'npm'

      # 3. Setup Java Development Kit (JDK) 21
      # This fixes the "invalid source release: 21" error
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # High-performance OpenJDK distribution
          java-version: '21'

      # 4. Install npm Dependencies
      - name: Install dependencies
        run: npm ci

      # 5. Build Web Assets
      # Compiles the React/TypeScript files to produce the static 'dist' directory
      - name: Build Web App
        run: npm run build

      # 6. Synchronize Capacitor Assets
      # Copies web assets to the Android platform folder and updates plugins
      - name: Sync Capacitor
        run: npx cap sync android

      # 7. Grant Gradle Execution Permission
      # This fixes the "./gradlew: Permission denied" error
      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      # 8. Compile and Build Debug Android APK
      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      # 9. Upload Built APK as a Workflow Artifact
      # You can download the completed APK from the GitHub Actions run details
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-football-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7